<ytd-channel-renderer>
  <a id="main-link" href="https://www.youtube.com/@SampleChannel">
    <img id="img" src="https://yt3.ggpht.com/sample-avatar.jpg" />
  </a>
  <div id="info-section">
    <div id="text-container">
      <yt-formatted-string id="text">Sample Channel</yt-formatted-string>
    </div>
    <yt-formatted-string id="subscribers">@SampleChannel</yt-formatted-string>
    <yt-formatted-string id="video-count">1.2M subscribers</yt-formatted-string>
    <yt-formatted-string id="description">A description of the channel.</yt-formatted-string>
  </div>
</ytd-channel-renderer>
